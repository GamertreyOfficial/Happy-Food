<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D Sandbox Kitchen - Trash & Tools</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --accent: #ff9f43; --tool-accent: #4ecdc4; }
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Inter', sans-serif; touch-action: none; }
        
        /* UI HUD */
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        .nav { display: flex; gap: 10px; pointer-events: auto; }
        .btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--accent); }
        .btn-tool:hover { background: var(--tool-accent); }

        /* Shelves */
        .shelf { position: absolute; bottom: -400px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 800px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 15px; border-radius: 20px 20px 0 0; transition: 0.5s ease-out; pointer-events: auto; border: 1px solid rgba(255,255,255,0.1); }
        .shelf.active { bottom: 0; }
        .item { background: rgba(255,255,255,0.05); aspect-ratio: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 28px; transition: transform 0.2s; border: 1px solid transparent; }
        .item:hover { transform: scale(1.1); background: var(--glass); border-color: rgba(255,255,255,0.5); }

        /* Trash Can */
        #trash-zone {
            position: absolute; right: 20px; bottom: 20px; width: 80px; height: 80px;
            background: rgba(238, 82, 83, 0.2); border: 2px dashed #ee5253; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            pointer-events: auto; transition: 0.3s; z-index: 5;
        }
        #trash-zone.hovered { background: rgba(238, 82, 83, 0.6); transform: scale(1.1); }
    </style>
</head>
<body>

<div class="hud">
    <div class="nav">
        <button class="btn" onclick="toggleShelf('shelf-ingredients')">📦 Ingredients</button>
        <button class="btn btn-tool" onclick="toggleShelf('shelf-tools')">🛠️ Tools</button>
        <button class="btn" style="margin-left:auto; background: #ee5253;" onclick="location.reload()">🧹 Reset</button>
    </div>

    <div id="shelf-ingredients" class="shelf"></div>
    <div id="shelf-tools" class="shelf"></div>
</div>

<div id="trash-zone">🗑️</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "cannon": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { DragControls } from 'three/addons/controls/DragControls.js';
    import * as CANNON from 'cannon';

    // 1. SEPARATE DATA DICTIONARIES
    const INGREDIENTS = {
        apple: { icon: '🍎', file: 'apple.fbx', texture: 'apple_tex.png', color: 0xff0000 },
        banana: { icon: '🍌', file: 'banana.fbx', texture: null, color: 0xffe135 },
        orange: { icon: '🍊', file: 'orange.fbx', texture: 'orange_tex.png', color: 0xffa500 },
        lemon: { icon: '🍋', file: 'lemon.fbx', texture: null, color: 0xffff00 },
        grape: { icon: '🍇', file: 'grape.fbx', texture: null, color: 0x6f2da8 },
        strawberry: { icon: '🍓', file: 'strawberry.fbx', texture: null, color: 0xff2800 },
        steak: { icon: '🥩', file: 'steak.fbx', texture: 'meat_tex.png', color: 0x911e1e },
        cookie: { icon: '🍪', file: 'cookie.fbx', texture: null, color: 0x6b4423 },
        chocolate: { icon: '🍫', file: 'chocolate.fbx', texture: null, color: 0x3d1d16 },
        egg: { icon: '🥚', file: 'egg.fbx', texture: null, color: 0xffffff },
        yolk: { icon: '🍳', file: 'openeggwithyolk.fbx', texture: null, color: 0xffcc00 }
    };

    const TOOLS = {
        // Example placeholders for tools you'll add later
        knife: { icon: '🔪', file: 'knife.fbx', texture: null, color: 0xaaaaaa },
        pan: { icon: '🥘', file: 'pan.fbx', texture: null, color: 0x333333 }
    };

    // 2. SCENE & 2.5D CAMERA
    const scene = new THREE.Scene();
    const aspect = window.innerWidth / window.innerHeight;
    const frustumSize = 6;
    const camera = new THREE.OrthographicCamera(
        frustumSize * aspect / -2, frustumSize * aspect / 2, 
        frustumSize / 2, frustumSize / -2, 0.1, 1000
    );
    camera.position.set(0, 1, 10); 
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const world = new CANNON.World();
    world.gravity.set(0, -12, 0);

    const texLoader = new THREE.TextureLoader();
    texLoader.load('background.png', (t) => scene.background = t);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(2, 5, 5);
    sun.castShadow = true;
    scene.add(sun);

    // 3. TABLE
    const fbxLoader = new FBXLoader();
    fbxLoader.load('models/table.fbx', (fbx) => {
        fbx.position.set(0, -2.5, 0); 
        fbx.scale.set(0.006, 0.006, 0.006);
        fbx.traverse(c => { if(c.isMesh) { c.receiveShadow = true; c.castShadow = true; }});
        scene.add(fbx);

        const groundBody = new CANNON.Body({ mass: 0 });
        groundBody.addShape(new CANNON.Box(new CANNON.Vec3(10, 0.1, 10)));
        groundBody.position.set(0, -1.2, 0); // Floor height
        world.addBody(groundBody);
    });

    // 4. SPAWNING LOGIC (Accepts 'ingredient' or 'tool' category)
    const draggableObjects = [];
    const physicsPairs = [];

    window.spawn = function(key, category) {
        const config = category === 'tool' ? TOOLS[key] : INGREDIENTS[key];
        
        fbxLoader.load(`models/${config.file}`, (fbx) => {
            fbx.scale.set(0.004, 0.004, 0.004);
            fbx.position.set((Math.random() - 0.5) * 4, 4, 0); 

            fbx.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    if (config.texture) {
                        child.material.map = texLoader.load(`models/${config.texture}`);
                    } else {
                        child.material = new THREE.MeshPhongMaterial({ color: config.color });
                    }
                }
            });

            // Make tools heavier than ingredients as an example
            const objectMass = category === 'tool' ? 3 : 1;

            const body = new CANNON.Body({ 
                mass: objectMass, 
                shape: new CANNON.Sphere(0.3),
                position: new CANNON.Vec3(fbx.position.x, fbx.position.y, 0),
                linearDamping: 0.5
            });

            world.addBody(body);
            scene.add(fbx);
            draggableObjects.push(fbx);
            physicsPairs.push({ mesh: fbx, body: body });
        });
    };

    // 5. TRASH TRACKING & DRAG CONTROLS
    let mouseX = 0, mouseY = 0;
    window.addEventListener('pointermove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    const trashZone = document.getElementById('trash-zone');
    const dControls = new DragControls(draggableObjects, camera, renderer.domElement);

    dControls.addEventListener('dragstart', (e) => {
        const p = physicsPairs.find(x => x.mesh === e.object);
        if (p) { p.body.mass = 0; p.body.velocity.set(0,0,0); }
    });

    dControls.addEventListener('drag', (e) => {
        e.object.position.z = 0; // Lock Z
        
        // Highlight trash can if hovering over it
        const rect = trashZone.getBoundingClientRect();
        if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
            trashZone.classList.add('hovered');
        } else {
            trashZone.classList.remove('hovered');
        }
    });

    dControls.addEventListener('dragend', (e) => {
        const p = physicsPairs.find(x => x.mesh === e.object);
        const rect = trashZone.getBoundingClientRect();
        trashZone.classList.remove('hovered');

        // Check if dropped inside the Trash Zone bounds
        if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
            // Delete the object entirely
            scene.remove(e.object);
            draggableObjects.splice(draggableObjects.indexOf(e.object), 1);
            if (p) {
                world.removeBody(p.body);
                physicsPairs.splice(physicsPairs.indexOf(p), 1);
            }
        } else {
            // Drop it back into the physics world
            if (p) {
                p.body.mass = 1; // Restore weight
                p.body.position.copy(e.object.position);
                p.body.position.z = 0;
            }
        }
    });

    // 6. UI GENERATION & TOGGLES
    const shelfIngredients = document.getElementById('shelf-ingredients');
    Object.keys(INGREDIENTS).forEach(key => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = INGREDIENTS[key].icon;
        div.onclick = () => spawn(key, 'ingredient');
        shelfIngredients.appendChild(div);
    });

    const shelfTools = document.getElementById('shelf-tools');
    Object.keys(TOOLS).forEach(key => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = TOOLS[key].icon;
        div.onclick = () => spawn(key, 'tool');
        shelfTools.appendChild(div);
    });

    window.toggleShelf = (targetId) => {
        // Close all shelves except the one we clicked
        document.querySelectorAll('.shelf').forEach(shelf => {
            if (shelf.id === targetId) {
                shelf.classList.toggle('active');
            } else {
                shelf.classList.remove('active');
            }
        });
    };

    // 7. RENDER LOOP
    function animate() {
        requestAnimationFrame(animate);
        world.fixedStep();
        
        physicsPairs.forEach(p => {
            p.body.position.z = 0;
            p.body.velocity.z = 0;
            if (p.body.mass > 0) {
                p.mesh.position.copy(p.body.position);
                p.mesh.quaternion.copy(p.body.quaternion);
            }
        });
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        const newAspect = window.innerWidth / window.innerHeight;
        camera.left = -frustumSize * newAspect / 2;
        camera.right = frustumSize * newAspect / 2;
        camera.top = frustumSize / 2;
        camera.bottom = -frustumSize / -2;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
